<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Manager</title>

  <!-- Bootstrap 5.3.0 — must match admin library policy exactly -->
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />

  <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-light py-5">

  <div class="container" style="max-width:600px">
    <h1 class="mb-1 fw-bold text-primary text-center">Task Manager</h1>
    <p class="text-center text-muted mb-4">Add and manage your daily tasks</p>

    <!-- Add task form -->
    <div class="card shadow mb-4">
      <div class="card-body">
        <h5 class="card-title mb-3">Add New Task</h5>
        <div class="input-group">
          <input id="task-input" type="text" class="form-control"
            placeholder="Enter task description…" />
          <button id="btn-add" class="btn btn-primary">Add Task</button>
        </div>
        <p id="error-msg" class="text-danger mt-2 small d-none">Please enter a task.</p>
      </div>
    </div>

    <!-- Task list -->
    <div class="card shadow">
      <div class="card-body">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h5 class="card-title mb-0">Tasks</h5>
          <span id="task-count" class="badge bg-primary">0 tasks</span>
        </div>
        <ul id="task-list" class="list-group list-group-flush"></ul>
        <p id="empty-msg" class="text-muted text-center mt-3">No tasks yet. Add one above!</p>
      </div>
    </div>
  </div>

  <!-- jQuery 3.7.0 — must match admin library policy exactly -->
  <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
  <!-- Bootstrap 5.3.0 JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
