<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Manager</title>

  <!-- ❌ VIOLATION 1: Wrong Bootstrap version (5.2.3 not allowed, only 5.3.0 is) -->
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" />

  <!-- ❌ VIOLATION 2: Tailwind CSS loaded (not assigned to this assignment) -->
  <link rel="stylesheet" href="https://cdn.tailwindcss.com" />

  <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-light py-5">

  <div class="container" style="max-width:600px">
    <h1 class="mb-1 fw-bold text-center">Task Manager</h1>
    <p class="text-center text-muted mb-4">Add and manage your daily tasks</p>

    <div class="card shadow mb-4">
      <div class="card-body">
        <h5 class="card-title mb-3">Add New Task</h5>
        <div class="input-group">
          <input id="task-input" type="text" class="form-control"
            placeholder="Enter task description…" />
          <button id="btn-add" class="btn btn-success">Add Task</button>
        </div>
      </div>
    </div>

    <div class="card shadow">
      <div class="card-body">
        <h5 class="card-title mb-3">Tasks</h5>
        <ul id="task-list" class="list-group list-group-flush"></ul>
        <p id="empty-msg" class="text-muted text-center mt-3">No tasks yet.</p>
      </div>
    </div>
  </div>

  <!-- ❌ VIOLATION 3: Wrong jQuery version (3.6.0 not allowed, only 3.7.0 is) -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <!-- ❌ VIOLATION 4: Completely unauthorized library (Lodash — not in system at all) -->
  <script src="https://cdn.jsdelivr.net/npm/lodash@4.17.21/lodash.min.js"></script>

  <!-- ❌ VIOLATION 5: Bootstrap JS wrong version matches wrong CSS above -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>

  <script src="app.js"></script>
</body>
</html>
